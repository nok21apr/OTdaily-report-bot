name: Auto Export Report

on:
  schedule:
    # รันตอน 8.00 น. เวลาไทย (01:00 UTC)
    - cron: '0 1 * * *' 
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # ตั้งค่า Timezone Server เป็นไทย
    env:
      TZ: 'Asia/Bangkok' 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🟢 เพิ่ม: ติดตั้งฟอนต์ไทย เพื่อให้ Screenshot อ่านออก
      - name: Install Thai Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-thai-tlwg

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          WEB_USER: ${{ secrets.WEB_USER }}
          WEB_PASS: ${{ secrets.WEB_PASS }}
        run: node script.js
        
      - name: Upload Debug Screenshots
        if: always()   # <--- เปลี่ยนเป็น always() เพื่อให้ส่งรูปเสมอ ไม่ว่าจะ error หรือไม่
        uses: actions/upload-artifact@v4
        with:
          name: debug-cctv-images
          path: "*.png"   # <--- เก็บทุกรูปที่มีนามสกุล .png
          retention-days: 5    
