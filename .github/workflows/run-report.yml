name: Auto Export Report

on:
  schedule:
    # ตั้งเวลา Cron (หน่วยเป็น UTC)
    # UTC 01:00 = Thailand 08:00
    - cron: '0 1 * * *' 
  workflow_dispatch: # ปุ่มกดรันเอง (Manual Run)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # ตั้งค่า Timezone ของเครื่อง Server ให้เป็นไทย
    env:
      TZ: 'Asia/Bangkok' 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # ... (Steps ก่อนหน้า: Run Script) ...

      - name: Run Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: node script.js

      # -------------------------------------------------------------
      # 📸 ส่วนที่เพิ่ม: อัปโหลดรูป Debug (จะทำงานเฉพาะตอน Error เท่านั้น)
      # -------------------------------------------------------------
      - name: Upload Debug Screenshot
        if: failure() # บรรทัดนี้สำคัญ! บอกว่าให้ทำเฉพาะตอน "Script พัง"
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
          retention-days: 5 # เก็บไฟล์ไว้ 5 วันแล้วลบทิ้ง
