name: Auto Export Report

on:
  schedule:
    # รันตอน 8.00 น. เวลาไทย (01:00 UTC)
    - cron: '0 1 * * *' 
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # ตั้งค่า Timezone Server เป็นไทย
    env:
      TZ: 'Asia/Bangkok' 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Script
        # 🟢 ส่วนที่แก้ไข: เพิ่ม WEB_USER และ WEB_PASS
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          WEB_USER: ${{ secrets.WEB_USER }}   # <-- เพิ่มบรรทัดนี้
          WEB_PASS: ${{ secrets.WEB_PASS }}   # <-- เพิ่มบรรทัดนี้
        run: node script.js

      # อัปโหลดรูป Debug เมื่อเกิด Error เท่านั้น
      - name: Upload Debug Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
          retention-days: 5
